workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build and package iOS
        script: |
          cd ios

          # Step 1: Find workspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE_NAME"

          # Step 2: List all schemes
          echo "=== Available schemes ==="
          xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list

          # Step 3: Get first scheme
          SCHEME=$(xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^[[:space:]]*$" \
            | head -1 | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          echo "Using scheme: '$SCHEME'"

          # Step 4: Build for simulator - output directly to known folder
          BUILD_DIR="$(pwd)/SimBuild"
          mkdir -p "$BUILD_DIR"

          echo "=== Building for simulator ==="
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO

          echo "=== Build finished. Listing SimBuild: ==="
          ls -la "$BUILD_DIR"

          echo "=== All .app files: ==="
          find "$BUILD_DIR" -name "*.app" 2>/dev/null

          # Step 5: Create IPA
          APP=$(find "$BUILD_DIR" -name "*.app" | grep -v ".appex" | head -1)
          echo "App to package: $APP"

          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in $BUILD_DIR"
            echo "Full listing:"
            find "$BUILD_DIR" -maxdepth 5 2>/dev/null
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp
          zip -r ~/menorahapp.ipa Payload/
          echo "✅ IPA created successfully"
          ls -lh ~/menorahapp.ipa

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM