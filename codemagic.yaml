workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Simulator
        script: |
          cd ios

          # Find workspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE_NAME"

          # List ALL schemes so we can see what's available
          echo "=== ALL SCHEMES ==="
          xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list 2>&1

          # Get the MAIN app scheme - skip Pods schemes
          # The main scheme should match the workspace/app name
          SCHEME=$(xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' \
            | grep -v "Schemes:" \
            | grep -v "^[[:space:]]*$" \
            | grep -v "Pods-" \
            | grep -v "AppAuth" \
            | grep -v "React" \
            | grep -v "RN" \
            | grep -v "Expo" \
            | head -1 \
            | sed 's/^[[:space:]]*//' \
            | sed 's/[[:space:]]*$//')

          if [ -z "$SCHEME" ]; then
            SCHEME="$WORKSPACE_NAME"
          fi

          echo "Using scheme: '$SCHEME'"
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV

          # Build the main app
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build 2>&1 | tail -20

          echo "=== Searching for .app ==="
          DERIVED_BASE=~/Library/Developer/Xcode/DerivedData

          # List the DerivedData folder for our app
          echo "DerivedData contents:"
          ls "$DERIVED_BASE/" 2>/dev/null

          # Find Build/Products folder
          echo "Build Products:"
          find "$DERIVED_BASE/${WORKSPACE_NAME}-"* -name "Products" -type d 2>/dev/null | head -3

          # Find .app
          find "$DERIVED_BASE" \
            -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            2>/dev/null | head -10

      - name: Create IPA
        script: |
          DERIVED_BASE=~/Library/Developer/Xcode/DerivedData

          # Find .app in DerivedData - look in Products folder
          APP=$(find "$DERIVED_BASE" \
            -path "*/Products/Debug-iphonesimulator/*.app" \
            -not -name "*.appex" \
            2>/dev/null | head -1)

          echo "Found in Products: $APP"

          # Fallback
          if [ -z "$APP" ]; then
            APP=$(find "$DERIVED_BASE" \
              -name "*.app" \
              -not -name "*.appex" \
              -not -path "*/Intermediates*" \
              2>/dev/null | head -1)
            echo "Fallback: $APP"
          fi

          if [ -z "$APP" ]; then
            echo "No .app found. DerivedData structure:"
            find "$DERIVED_BASE/${SCHEME_NAME:-MenorahFamilyCamp}"* \
              -maxdepth 6 -type d 2>/dev/null | head -20
            exit 1
          fi

          echo "Creating IPA from: $APP"
          mkdir -p /tmp/IPA/Payload
          cp -r "$APP" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r ~/menorahapp.ipa Payload/
          ls -lh ~/menorahapp.ipa
          echo "✅ IPA created!"

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM