workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        script: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE_NAME"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE_NAME.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | tr -d ' \t')
          if [ -z "$SCHEME" ]; then SCHEME="$WORKSPACE_NAME"; fi
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found scheme: $SCHEME"

      - name: Build iOS Simulator
        script: |
          cd ios

          # Use a local derivedData inside the ios folder
          DERIVED="$(pwd)/build_output"
          echo "DERIVED=$DERIVED" >> $CM_ENV
          mkdir -p "$DERIVED"

          echo "Building workspace=$WORKSPACE_NAME scheme=$SCHEME"
          echo "Output to: $DERIVED"

          set -o pipefail
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty --color || xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

          echo "Build complete. Listing output:"
          find "$DERIVED" -name "*.app" 2>/dev/null | head -10

      - name: Create IPA
        script: |
          cd ios
          echo "Searching in: $DERIVED"

          # Find .app - search multiple possible locations
          APP=$(find "$DERIVED" -name "*.app" 2>/dev/null \
            | grep -v ".appex" \
            | grep -v "Intermediates" \
            | head -1)

          echo "Found: $APP"

          if [ -z "$APP" ]; then
            echo "Searching entire build directory..."
            find /Users/builder/clone/ios -name "*.app" 2>/dev/null | grep -v ".appex" | head -10
            APP=$(find /Users/builder/clone/ios -name "*.app" 2>/dev/null \
              | grep -v ".appex" | head -1)
            echo "Found: $APP"
          fi

          if [ -z "$APP" ]; then
            echo "No .app found anywhere. Build may have failed."
            echo "Checking build logs..."
            find /Users/builder/clone -name "*.log" 2>/dev/null | head -5
            exit 1
          fi

          mkdir -p /tmp/IPA/Payload
          cp -r "$APP" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r ~/menorahapp.ipa Payload/
          echo "✅ IPA created"
          ls -lh ~/menorahapp.ipa

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM