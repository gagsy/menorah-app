workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build and Create IPA
        script: |
          cd ios

          # Step 1: Find workspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE_NAME"

          # Step 2: Show ALL schemes
          echo "=== ALL SCHEMES ==="
          xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list 2>&1
          echo "==================="

          # Step 3: Use exact workspace name as scheme (most reliable)
          SCHEME="$WORKSPACE_NAME"
          echo "Using scheme: $SCHEME"

          # Step 4: Build with explicit output dir and capture full output
          OUTPUT_DIR="$(pwd)/AppOutput"
          mkdir -p "$OUTPUT_DIR"

          echo "=== STARTING BUILD ==="
          set -o pipefail

          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$OUTPUT_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO 2>&1

          BUILD_EXIT=$?
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="

          # Step 5: Show what was built
          echo "=== Contents of AppOutput ==="
          find "$OUTPUT_DIR" -maxdepth 4 -type d 2>/dev/null | head -30

          echo "=== All .app files ==="
          find "$OUTPUT_DIR" -name "*.app" -not -name "*.appex" 2>/dev/null

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED!"
            exit 1
          fi

          # Step 6: Find and package the app
          APP=$(find "$OUTPUT_DIR" \
            -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            2>/dev/null | head -1)

          echo "App found: $APP"

          if [ -z "$APP" ]; then
            echo "No .app in AppOutput, checking Xcode DerivedData..."
            APP=$(find ~/Library/Developer/Xcode/DerivedData \
              -name "*.app" \
              -not -name "*.appex" \
              -not -path "*/Intermediates*" \
              2>/dev/null | head -1)
            echo "DerivedData app: $APP"
          fi

          if [ -z "$APP" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi

          # Step 7: Create IPA
          echo "Packaging: $APP"
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp
          zip -r ~/menorahapp.ipa Payload/
          ls -lh ~/menorahapp.ipa
          echo "✅ IPA created successfully"

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM