workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Simulator
        script: |
          cd ios

          # Find workspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE_NAME"

          # Get scheme
          SCHEME=$(xcodebuild -workspace "${WORKSPACE_NAME}.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^[[:space:]]*$" \
            | head -1 | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          if [ -z "$SCHEME" ]; then SCHEME="$WORKSPACE_NAME"; fi
          echo "Scheme: $SCHEME"

          # Save for next step
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "SCHEME=$SCHEME" >> $CM_ENV

          # Build WITHOUT CONFIGURATION_BUILD_DIR so Xcode uses its default DerivedData
          # The .app will be in ~/Library/Developer/Xcode/DerivedData/*/Build/Products/
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build

          echo "=== Build done. Searching for .app ==="
          # Search in Xcode default DerivedData location
          find ~/Library/Developer/Xcode/DerivedData -name "${WORKSPACE_NAME}.app" \
            -not -path "*/Intermediates*" 2>/dev/null | head -5

          find ~/Library/Developer/Xcode/DerivedData -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            -path "*iphonesimulator*" 2>/dev/null | head -5

      - name: Create IPA
        script: |
          echo "Searching for .app in DerivedData..."

          # Search in default Xcode DerivedData
          APP=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            -path "*iphonesimulator*" \
            2>/dev/null | head -1)

          echo "Found: $APP"

          # Fallback - search entire DerivedData without simulator filter
          if [ -z "$APP" ]; then
            echo "Trying without simulator filter..."
            APP=$(find ~/Library/Developer/Xcode/DerivedData \
              -name "*.app" \
              -not -name "*.appex" \
              -not -path "*/Intermediates*" \
              2>/dev/null | head -1)
            echo "Fallback found: $APP"
          fi

          # Last resort - search everywhere
          if [ -z "$APP" ]; then
            echo "Searching everywhere..."
            find / -name "MenorahFamilyCamp.app" 2>/dev/null | head -5
            find / -name "menorahapp.app" 2>/dev/null | head -5
            find / -name "menorah*.app" -not -name "*.appex" 2>/dev/null | head -5
            APP=$(find / -name "*.app" -not -name "*.appex" \
              -not -path "*/Xcode.app/*" \
              -not -path "*/Applications/*" \
              -path "*Debug*" 2>/dev/null | head -1)
            echo "Last resort: $APP"
          fi

          if [ -z "$APP" ]; then
            echo "Could not find .app anywhere!"
            echo "DerivedData contents:"
            ls ~/Library/Developer/Xcode/DerivedData/ 2>/dev/null
            exit 1
          fi

          echo "Creating IPA from: $APP"
          mkdir -p /tmp/IPA/Payload
          cp -r "$APP" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r ~/menorahapp.ipa Payload/
          ls -lh ~/menorahapp.ipa
          echo "✅ IPA created!"

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM