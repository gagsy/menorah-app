workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi

          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()

          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """

          if 'post_install do |installer|' in content:
              content = content.replace(
                  'post_install do |installer|',
                  'post_install do |installer|' + inject,
                  1
              )
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'

          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated successfully")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Find workspace name and scheme
        script: |
          cd ios

          # Find actual workspace name
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE_NAME"

          # Find scheme - use workspace name as default
          SCHEME=$(xcodebuild -workspace "$WORKSPACE_NAME.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | tr -d ' \t')

          if [ -z "$SCHEME" ]; then
            SCHEME="$WORKSPACE_NAME"
          fi
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found scheme: $SCHEME"

      - name: Build iOS Simulator
        script: |
          cd ios
          echo "Building: workspace=$WORKSPACE_NAME scheme=$SCHEME"

          # Use iPhone 16 (available on Xcode 16.2 / iOS 18.2)
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build 2>&1 | tee build.log | tail -50

          # Check if build succeeded
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed - last 20 lines:"
            tail -20 build.log
            exit 1
          fi

      - name: Create IPA
        script: |
          cd ios
          echo "Looking for .app file..."
          find DerivedData -name "*.app" 2>/dev/null | head -5

          APP=$(find DerivedData -name "*.app" \
            -not -path "*/Build/Intermediates*" \
            -not -name "*.appex" \
            | head -1)

          echo "Using: $APP"

          if [ -z "$APP" ]; then
            echo "No .app found!"
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r menorahapp.ipa Payload/
          ls -lh menorahapp.ipa
          echo "✅ IPA created successfully"

    artifacts:
      - ios/menorahapp.ipa
      - ios/build.log

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM