workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile - merge post_install hooks
        script: |
          cd ios
          # Add use_modular_headers! if not present
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi

          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()

          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """

          if 'post_install do |installer|' in content:
              content = content.replace(
                  'post_install do |installer|',
                  'post_install do |installer|' + inject,
                  1
              )
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'

          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Find workspace and build
        script: |
          cd ios

          # Find the actual .xcworkspace name
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          echo "Found workspace: $WORKSPACE"

          # Get just the name without path and extension
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace name: $WORKSPACE_NAME"

          # Find scheme
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A5 "Schemes:" | grep -v "Schemes:" | head -1 | tr -d ' ')
          echo "Found scheme: $SCHEME"

          # Use workspace name as scheme if scheme detection fails
          if [ -z "$SCHEME" ]; then
            SCHEME="$WORKSPACE_NAME"
          fi

          echo "Building: workspace=$WORKSPACE_NAME scheme=$SCHEME"

          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        script: |
          cd ios
          APP=$(find DerivedData -name "*.app" -not -path "*/Build/Intermediates*" | head -1)
          echo "Found app: $APP"
          if [ -z "$APP" ]; then
            echo "No .app found, listing DerivedData:"
            find DerivedData -name "*.app" 2>/dev/null || echo "DerivedData empty"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r menorahapp.ipa Payload/
          echo "IPA created"

    artifacts:
      - ios/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM