workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        script: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE_NAME"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE_NAME.xcworkspace" -list 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | tr -d ' \t')
          if [ -z "$SCHEME" ]; then SCHEME="$WORKSPACE_NAME"; fi
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found scheme: $SCHEME"

      - name: Build iOS Simulator
        script: |
          cd ios
          echo "Building workspace=$WORKSPACE_NAME scheme=$SCHEME"

          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build

          # Save derived data path for next step
          echo "DERIVED_DATA=$CM_BUILD_DIR/DerivedData" >> $CM_ENV

      - name: Create IPA
        script: |
          echo "Searching for .app in: $DERIVED_DATA"

          # List everything to debug
          find "$DERIVED_DATA" -name "*.app" 2>/dev/null | grep -v ".appex" | head -10

          # Find the main app (not extensions)
          APP=$(find "$DERIVED_DATA" -name "*.app" 2>/dev/null \
            | grep -v ".appex" \
            | grep -v "Intermediates" \
            | grep "Debug-iphonesimulator" \
            | head -1)

          echo "Found app: $APP"

          # Fallback - search everywhere
          if [ -z "$APP" ]; then
            echo "Trying broader search..."
            APP=$(find "$DERIVED_DATA" -name "*.app" 2>/dev/null \
              | grep -v ".appex" \
              | head -1)
            echo "Fallback app: $APP"
          fi

          if [ -z "$APP" ]; then
            echo "Still no .app found. Full DerivedData structure:"
            find "$DERIVED_DATA" -maxdepth 5 -type d 2>/dev/null | head -30
            exit 1
          fi

          # Create IPA
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp
          zip -r "$CM_BUILD_DIR/menorahapp.ipa" Payload/
          echo "✅ IPA created: $CM_BUILD_DIR/menorahapp.ipa"
          ls -lh "$CM_BUILD_DIR/menorahapp.ipa"

    artifacts:
      - menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM