workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile - merge post_install hooks
        script: |
          cd ios
          # Read current Podfile
          PODFILE="Podfile"

          # Add use_modular_headers! if not already present
          if ! grep -q "use_modular_headers!" "$PODFILE"; then
            sed -i '' '1s/^/use_modular_headers!\n/' "$PODFILE"
            echo "Added use_modular_headers!"
          fi

          # Instead of adding a new post_install hook, we EDIT the existing one
          # by inserting our lines INSIDE the existing post_install block
          python3 << 'PYEOF'
          import re

          with open('Podfile', 'r') as f:
              content = f.read()

          # Lines to inject inside existing post_install
          inject = """
              # Fix for AppCheckCore Swift pod issue
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """

          # Find existing post_install and inject inside it
          if 'post_install do |installer|' in content:
              # Already has post_install - inject our lines inside it
              content = content.replace(
                  'post_install do |installer|',
                  'post_install do |installer|' + inject,
                  1  # only replace first occurrence
              )
              print("Injected into existing post_install hook")
          else:
              # No post_install exists - add one at the end
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
              print("Added new post_install hook")

          with open('Podfile', 'w') as f:
              f.write(content)

          print("Podfile updated successfully")
          PYEOF

          echo "Podfile contents:"
          cat Podfile

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Simulator
        script: |
          cd ios
          xcodebuild \
            -workspace menorahapp.xcworkspace \
            -scheme menorahapp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        script: |
          cd ios
          APP=$(find DerivedData -name "*.app" -not -path "*/Build/Intermediates*" | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r menorahapp.ipa Payload/
          echo "IPA created successfully"

    artifacts:
      - ios/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM