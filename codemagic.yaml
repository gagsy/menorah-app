workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 90
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        script: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV
          echo "Found workspace: $WORKSPACE_NAME"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE_NAME.xcworkspace" \
            -list 2>/dev/null \
            | awk '/Schemes:/,0' \
            | grep -v "Schemes:" \
            | grep -v "^$" \
            | head -1 \
            | tr -d ' \t')
          if [ -z "$SCHEME" ]; then SCHEME="$WORKSPACE_NAME"; fi
          echo "SCHEME=$SCHEME" >> $CM_ENV
          echo "Found scheme: $SCHEME"

      - name: Build iOS Simulator
        script: |
          cd ios
          DERIVED="$(pwd)/build_output"
          echo "DERIVED=$DERIVED" >> $CM_ENV
          mkdir -p "$DERIVED"

          echo "=== Starting xcodebuild ==="
          echo "Workspace: ${WORKSPACE_NAME}.xcworkspace"
          echo "Scheme: $SCHEME"
          echo "Output: $DERIVED"

          # Run build and capture exit code
          xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build
          BUILD_RESULT=$?

          echo "=== Build exit code: $BUILD_RESULT ==="
          echo "=== Files in build_output: ==="
          find "$DERIVED" -name "*.app" 2>/dev/null | head -20
          echo "=== Top level of build_output: ==="
          ls -la "$DERIVED" 2>/dev/null || echo "build_output is empty or missing"
          echo "=== Build/Products: ==="
          ls -la "$DERIVED/Build/Products/" 2>/dev/null || echo "No Build/Products folder"

          if [ $BUILD_RESULT -ne 0 ]; then
            echo "BUILD FAILED with code $BUILD_RESULT"
            exit $BUILD_RESULT
          fi

      - name: Create IPA
        script: |
          echo "=== Finding .app ==="
          echo "DERIVED path: $DERIVED"
          find "$DERIVED" -name "*.app" 2>/dev/null | grep -v ".appex"

          APP=$(find "$DERIVED/Build/Products" -name "*.app" 2>/dev/null \
            | grep -v ".appex" \
            | head -1)

          if [ -z "$APP" ]; then
            APP=$(find "$DERIVED" -name "*.app" 2>/dev/null \
              | grep -v ".appex" \
              | head -1)
          fi

          echo "Using app: $APP"

          if [ -z "$APP" ]; then
            echo "No .app found!"
            exit 1
          fi

          mkdir -p /tmp/IPA/Payload
          cp -r "$APP" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r ~/menorahapp.ipa Payload/
          ls -lh ~/menorahapp.ipa
          echo "✅ IPA created"

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM