workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM

  ios-build:
    name: iOS IPA Build
    max_build_duration: 45
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean

      - name: Fix Podfile
        script: |
          cd ios
          if ! grep -q "use_modular_headers!" Podfile; then
            sed -i '' '1s/^/use_modular_headers!\n/' Podfile
          fi
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
                end
              end
          """
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|',
                  'post_install do |installer|' + inject, 1)
          else:
              content += '\npost_install do |installer|\n' + inject + '\nend\n'
          with open('Podfile', 'w') as f:
              f.write(content)
          print("Podfile updated")
          PYEOF

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Simulator
        script: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          WORKSPACE_NAME=$(basename "$WORKSPACE" .xcworkspace)
          OUTPUT_DIR="$(pwd)/AppOutput"
          mkdir -p "$OUTPUT_DIR"

          echo "Building: $WORKSPACE_NAME"
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> $CM_ENV
          echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $CM_ENV

          # CRITICAL FIX: timeout command prevents infinite hang
          # If build takes more than 20 minutes, kill it
          timeout 1200 xcodebuild \
            -workspace "${WORKSPACE_NAME}.xcworkspace" \
            -scheme "$WORKSPACE_NAME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=18.2,name=iPhone 16' \
            -derivedDataPath "$OUTPUT_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build

          BUILD_EXIT=$?
          echo "Build exit code: $BUILD_EXIT (124 = timeout)"

          # Check if .app exists regardless of exit code
          APP=$(find "$OUTPUT_DIR" \
            -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            2>/dev/null | head -1)

          echo "App found: $APP"

          if [ -z "$APP" ]; then
            echo "ERROR: No .app created"
            exit 1
          fi

          echo "✅ App built successfully: $APP"

      - name: Create IPA
        script: |
          APP=$(find "$OUTPUT_DIR" \
            -name "*.app" \
            -not -name "*.appex" \
            -not -path "*/Intermediates*" \
            2>/dev/null | head -1)

          echo "Packaging: $APP"

          if [ -z "$APP" ]; then
            echo "No .app found!"
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp
          zip -r ~/menorahapp.ipa Payload/
          ls -lh ~/menorahapp.ipa
          echo "✅ IPA created!"

    artifacts:
      - ~/menorahapp.ipa

    publishing:
      email:
        recipients:
          - AJAYDANIELKALE@GMAIL.COM